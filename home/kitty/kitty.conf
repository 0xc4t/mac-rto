include colors.conf
font_family Iosevka Nerd Font Mono 
font_size 17
bold_font auto
italic_font auto
bold_italic_font auto
background_opacity 0.95
cursor_shape beam
cursor_shape_focused block
cursor_color #ffffff 
cursor_text_color #000000
enable_audio_bell no
window_padding_width 8
window_margin_width 8
cursor_trail 3
macos_titlebar_color background
macos_show_window_title_in none
background_blur 50

enabled_layouts horizontal
map cmd+enter new_tab
map cmd+q close_tab
map cmd+shift+n set_tab_title
map cmd+right next_tab
map cmd+left previous_tab
map cmd+shift+f move_window_forward
map cmd+shift+l launch --location=vsplit
map cmd+1 first_window
map cmd+2 second_window
map cmd+3 third_window
map cmd+4 fourth_window
map cmd+5 fifth_window
map cmd+6 sixth_window
map cmd+7 seventh_window
map cmd+8 eighth_window
map cmd+9 ninth_window
map cmd+0 tenth_window

scrollbar never
symbol_map U+E000-U+F1AF0 JetBrainsMonoNL Nerd Font

# Tab Bar Settings
tab_bar_edge              bottom
tab_bar_style             separator
tab_separator             " "
tab_title_template        "[{title}]"
active_tab_title_template "[{title}]"
active_tab_font_style     bold
inactive_tab_font_style   normal
